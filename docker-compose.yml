services:
  postgres:
    image: postgres:15-alpine
    container_name: bamaq_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: bamaq_payments_db
    ports:
      - '5433:5432'
    restart: unless-stopped
  bamaq_redis:
    image: redis:7-alpine
    container_name: bamaq_redis
    ports:
      - '6379:6379'
    restart: always
